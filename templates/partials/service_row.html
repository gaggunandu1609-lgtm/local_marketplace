<tr id="service-row-{{ service.id }}">
    <td class="px-4 py-3">
        <div class="rounded-3 overflow-hidden" style="width: 80px; height: 60px;">
            {% if service.image %}
                <img src="{{ service.image.url }}" class="w-100 h-100" style="object-fit: cover;">
            {% else %}
                <div class="w-100 h-100 bg-secondary-subtle d-flex align-items-center justify-content-center">
                    <i class="fa-solid fa-image text-muted"></i>
                </div>
            {% endif %}
        </div>
    </td>
    <td class="py-3 fw-bold">{{ service.name }}</td>
    <td class="py-3">
        <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill">
            {{ service.category.name }}
        </span>
    </td>
    <td class="py-3 fw-bold text-success">₹{{ service.price }}</td>
    <td class="py-3 text-center">
        {% if service.is_active %}
            <span class="badge bg-success-subtle text-success px-3 py-2 rounded-pill">Active</span>
        {% else %}
            <span class="badge bg-secondary-subtle text-secondary px-3 py-2 rounded-pill">Inactive</span>
        {% endif %}
    </td>
    <td class="px-4 py-3 text-end">
        <button hx-get="{% url 'edit_service' service.id %}" 
                hx-target="#service-row-{{ service.id }}" 
                hx-swap="outerHTML" 
                class="btn btn-light btn-sm px-3 rounded-pill me-2">
            <i class="fa-solid fa-pen me-1"></i> Edit
        </button>
        <button hx-post="{% url 'delete_service' service.id %}" 
                hx-target="#service-row-{{ service.id }}" 
                hx-swap="outerHTML" 
                hx-confirm="Are you sure you want to delete this service?"
                class="btn btn-outline-danger btn-sm px-3 rounded-pill">
            <i class="fa-solid fa-trash"></i>
        </button>
    </td>
</tr>
