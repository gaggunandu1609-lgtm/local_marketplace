{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 text-center">
        <div class="glass-card p-5">
            <div class="mb-4">
                <div style="width:80px;height:80px;background:linear-gradient(135deg,#ef4444,#dc2626);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 10px 30px rgba(239,68,68,0.4);">
                    <i class="fa-solid fa-xmark text-white" style="font-size:36px;"></i>
                </div>
            </div>
            <h2 class="fw-bold mb-3">Payment Cancelled</h2>
            <p class="text-muted mb-5">Your payment was not completed. Your booking has not been confirmed. No charges were made.</p>
            <div class="d-flex gap-3 justify-content-center">
                <a href="{% url 'services' %}" class="btn fw-bold py-3 px-5" style="border-radius:14px;">Browse Services</a>
                <a href="/" class="btn btn-outline-secondary fw-bold py-3 px-5" style="border-radius:14px;">Go Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
