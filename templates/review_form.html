{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="glass-card p-5 text-center">
            <h2 class="fw-800 mb-2">How was your service?</h2>
            <p class="text-muted mb-5">Rate your experience with <strong>{{ booking.service.provider.business_name }}</strong></p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-5">
                    <label class="form-label d-block mb-3 fw-bold">Select Rating</label>
                    <div class="rating-stars h2 text-warning d-flex justify-content-center gap-3">
                        <input type="radio" name="rating" value="5" id="s5" class="d-none" checked><label for="s5" class="cursor-pointer"><i class="fa-solid fa-star"></i></label>
                        <input type="radio" name="rating" value="4" id="s4" class="d-none"><label for="s4" class="cursor-pointer"><i class="fa-solid fa-star"></i></label>
                        <input type="radio" name="rating" value="3" id="s3" class="d-none"><label for="s3" class="cursor-pointer"><i class="fa-solid fa-star"></i></label>
                        <input type="radio" name="rating" value="2" id="s2" class="d-none"><label for="s2" class="cursor-pointer"><i class="fa-solid fa-star"></i></label>
                        <input type="radio" name="rating" value="1" id="s1" class="d-none"><label for="s1" class="cursor-pointer"><i class="fa-solid fa-star"></i></label>
                    </div>
                </div>
                
                <div class="mb-4 text-start">
                    <label class="form-label fw-600">Comment</label>
                    <textarea name="comment" class="form-control bg-light border-0 py-3 rounded-4" rows="4" placeholder="Tell us more about the service..." required></textarea>
                </div>
                
                <button type="submit" class="btn w-100 py-3 fw-bold">Submit Review</button>
            </form>
        </div>
    </div>
</div>

<style>
    .cursor-pointer { cursor: pointer; }
    .rating-stars label:hover, 
    .rating-stars input:checked ~ label {
        opacity: 1;
        transition: 0.2s;
    }
    .rating-stars label {
        opacity: 0.3;
    }
    /* Simple star logic: will highlight all stars before it if using reverse order or JS, 
       for pure CSS and simple radio we just use opacity on the selected one for now or a small CSS trick */
</style>
{% endblock %}
