{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-card p-0 overflow-hidden d-flex flex-column" style="height: 600px;">
            <!-- Header -->
            <div class="p-3 border-bottom d-flex align-items-center justify-content-between bg-white">
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-primary text-white d-flex align-items-center justify-content-center fw-bold rounded-circle"
                        style="width: 45px; height: 45px;">
                        {{ other_user.username|slice:":1"|upper }}
                    </div>
                    <div>
                        <h6 class="fw-bold mb-0">{{ other_user.username }}</h6>
                        <small class="text-success"><i class="fa-solid fa-circle me-1" style="font-size: 0.5rem;"></i>
                            Online</small>
                    </div>
                </div>
                <a href="{% url 'chat_list' %}" class="btn btn-light btn-sm rounded-pill px-3">
                    <i class="fa-solid fa-arrow-left me-1"></i> Back
                </a>
            </div>

            <!-- Messages Area -->
            <div id="chat-messages" class="flex-grow-1 p-4" style="overflow-y: auto;"
                hx-get="{% url 'get_messages' other_user.id %}" hx-trigger="every 5s" hx-swap="innerHTML">
                {% include "chat/_message_list.html" %}
            </div>

            <!-- Input Area -->
            <div class="p-3 bg-white border-top">
                <form hx-post="{% url 'chat_view' other_user.id %}" hx-target="#chat-messages" hx-swap="innerHTML"
                    onhtmx:afterRequest="this.reset(); scrollBottom();" class="d-flex gap-2">
                    {% csrf_token %}
                    <input type="text" name="content" class="form-control rounded-pill px-4 border-0 bg-light"
                        placeholder="Type a message..." required>
                    <button type="submit"
                        class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center"
                        style="width: 45px; height: 45px;">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function scrollBottom() {
        const container = document.getElementById('chat-messages');
        container.scrollTop = container.scrollHeight;
    }

    // Initial scroll
    document.addEventListener('DOMContentLoaded', scrollBottom);

    // Scroll after HTMX update
    document.body.addEventListener('htmx:afterSettle', function (evt) {
        if (evt.detail.target.id === 'chat-messages') {
            scrollBottom();
        }
    });
</script>
{% endblock %}
