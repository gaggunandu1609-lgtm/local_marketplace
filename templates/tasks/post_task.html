{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-4">Post a Task</h2>
                <p class="text-muted mb-4">Describe what you need help with and local pros will send you quotes.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Task Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Fix leaking kitchen sink" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <textarea name="description" class="form-control" rows="4" placeholder="Provide as much detail as possible..." required></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Budget (₹)</label>
                            <input type="number" name="budget" class="form-control" placeholder="e.g. 500" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Preferred Date</label>
                            <input type="date" name="preferred_date" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">City</label>
                            <select name="city" class="form-select" required>
                                <option value="">Select a City</option>
                                {% for city in cities %}
                                    <option value="{{ city.id }}">{{ city.name }}, {{ city.state }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Location Details</label>
                            <input type="text" name="location_details" class="form-control" placeholder="e.g. Whitefield, Near Forum Mall" required>
                        </div>
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Post Task & Get Quotes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
