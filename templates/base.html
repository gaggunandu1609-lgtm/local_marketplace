<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Local Marketplace - Find Pros Near You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;       /* Indigo */
            --primary-hover: #4338ca;
            --secondary: #10b981;     /* Emerald */
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --surface: rgba(255, 255, 255, 0.85);
            --border-color: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #e0e7ff 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* GLASSMORPHISM NAVBAR */
        .navbar {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }
        
        .logo span {
            color: var(--text-main);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links a, .nav-links button {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s ease;
            position: relative;
            background: none;
            border: none;
            cursor: pointer;
        }

        .nav-links a:not(.btn):hover {
            color: var(--primary);
        }
        
        .nav-links a:not(.btn)::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }
        
        .nav-links a:not(.btn):hover::after {
            width: 100%;
        }

        .btn {
            background: var(--primary);
            color: white !important;
            padding: 10px 24px;
            border-radius: 999px; /* Pill shape */
            font-weight: 600;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.23);
        }
        
        .btn-outline {
            background: transparent;
            color: var(--primary) !important;
            border: 2px solid var(--primary);
            box-shadow: none;
        }
        
        .btn-outline:hover {
            background: var(--primary);
            color: white !important;
        }

        /* MAIN CONTENT AREA */
        .content {
            flex-grow: 1;
            padding: 40px 5%;
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* FOOTER */
        .footer {
            background: white;
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            border-top: 1px solid #e2e8f0;
            margin-top: auto;
        }
        
        .footer i {
            color: #ef4444;
        }

        /* GLOBAL UTILITIES */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .text-center { text-align: center; }
        .mt-4 { margin-top: 1.5rem; }
        .mb-4 { margin-bottom: 1.5rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none; /* In a real app, add a hamburger menu */
            }
            .content {
                padding: 20px 5%;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/" class="logo">
        <i class="fa-solid fa-layer-group"></i>
        Local<span>Pros</span>
    </a>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="{% url 'services' %}">Services</a>

        {% if user.is_authenticated %}
            <a href="/dashboard/">Dashboard</a>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline" style="font-size: 15px;">
                    Logout
                </button>
            </form>
        {% else %}
            <a href="/login/" class="btn btn-outline">Login</a>
            <a href="/accounts/register/" class="btn">Register</a>
        {% endif %}
    </div>
</nav>

<!-- PAGE CONTENT -->
<main class="content">
    {% block content %}
    {% endblock %}
</main>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 Local Pros. Built with Django <i class="fa-solid fa-heart"></i></p>
</footer>

</body>
</html>
