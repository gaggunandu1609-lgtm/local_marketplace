{% extends "base.html" %}
{% block content %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
        padding: 40px 20px;
    }
    
    .auth-card {
        width: 100%;
        max-width: 450px;
        padding: 40px;
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .auth-header h2 {
        font-size: 2rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 10px;
    }
    
    .auth-header p {
        color: var(--text-muted);
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--text-main);
        font-size: 0.95rem;
    }
    
    .input-wrapper {
        position: relative;
    }
    
    .input-wrapper i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
    }
    
    .form-control {
        width: 100%;
        padding: 12px 15px 12px 45px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 12px;
        font-size: 1rem;
        background: rgba(255, 255, 255, 0.8);
        transition: all 0.3s;
    }
    
    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        background: white;
    }
    
    .form-control:focus + i {
        color: var(--primary);
    }
    
    .auth-footer {
        margin-top: 25px;
        text-align: center;
        font-size: 0.95rem;
        color: var(--text-muted);
    }
    
    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="auth-container">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Login to access your bookings and dashboard</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem; padding: 14px; margin-top: 10px;">
                Login to Account
            </button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="/accounts/register/">Register here</a>
        </div>
    </div>
</div>

{% endblock %}
