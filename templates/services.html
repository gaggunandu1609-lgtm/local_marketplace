{% extends "base.html" %}

{% block content %}
<style>
    .filter-section {
        background: white;
        padding: 25px;
        border-radius: 24px;
        margin-bottom: 30px;
        border: 1px solid #f1f5f9;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    .service-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid #f1f5f9;
        border-radius: 24px;
        background: white;
        overflow: hidden;
    }
    .service-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        border-color: var(--primary);
    }
    .service-img {
        height: 180px;
        object-fit: cover;
        width: 100%;
    }
    .rating-badge {
        background: #fef3c7;
        color: #92400e;
        padding: 4px 10px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.85rem;
    }
    .price-tag {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--primary);
    }
</style>

<div class="row mb-4">
    <div class="col-12">
        <h1 class="fw-800 mb-2">Discover Services</h1>
        <p class="text-muted">Browse through our top-rated local professionals</p>
    </div>
</div>

<div class="row">
    <!-- FILTERS -->
    <div class="col-lg-3">
        <div class="filter-section">
            <form method="GET" action="{% url 'services' %}" 
                  hx-get="{% url 'services' %}" 
                  hx-target="#service-list" 
                  hx-swap="innerHTML"
                  hx-indicator="#loadingIndicator"
                  hx-trigger="change, keyup delay:500ms from:input[name='q'], keyup delay:500ms from:input[name='city']">
                <div id="loadingIndicator" class="htmx-indicator text-center text-primary mb-2">
                    <div class="spinner-border spinner-border-sm" role="status"></div> Loading...
                </div>
                <div class="mb-4">
                    <label class="form-label fw-600">Location (City)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fa-solid fa-location-dot text-muted"></i></span>
                        <input type="text" name="city" class="form-control bg-light border-0" placeholder="City..." value="{{ selected_city }}">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-600">Search Keywords</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                        <input type="text" name="q" class="form-control bg-light border-0" placeholder="Keywords..." value="{{ query }}">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-600">Category</label>
                    <select name="category" class="form-select bg-light border-0">
                        <option value="">All Categories</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if selected_category == cat.id|slugify %}selected{% endif %}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-600">Sort By</label>
                    <select name="sort" class="form-select bg-light border-0">
                        <option value="newest" {% if sort_by == 'newest' %}selected{% endif %}>Newest First</option>
                        <option value="rating" {% if sort_by == 'rating' %}selected{% endif %}>Best Rated</option>
                        <option value="price_low" {% if sort_by == 'price_low' %}selected{% endif %}>Price: Low to High</option>
                        <option value="price_high" {% if sort_by == 'price_high' %}selected{% endif %}>Price: High to Low</option>
                    </select>
                </div>
                
                <button type="submit" class="btn w-100 py-3 mt-2">Apply Filters</button>
                <a href="{% url 'services' %}" class="btn btn-light w-100 py-3 mt-3 text-muted">Reset</a>
            </form>
        </div>
    </div>

    <!-- SERVICES LIST -->
    <div class="col-lg-9" id="service-list">
        {% include "services/_service_list.html" %}
    </div>
</div>
{% endblock %}
