databases:
  - name: db
    databaseName: intern_project
    user: intern_project
    plan: free

services:
  - type: web
    name: local_marketplace
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn local_marketplace.wsgi:application"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: WEB_CONCURRENCY
        value: 4
