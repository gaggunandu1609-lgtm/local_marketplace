databases:
  - name: db
    databaseName: intern_project
    user: intern_project
    plan: free

services:
  - type: web
    name: intern_project
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn intern_project.wsgi:application"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
